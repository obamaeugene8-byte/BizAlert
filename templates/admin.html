<h2>Admin Panel</h2>

<h3>Users</h3>

{% for user in users %}
<p>
    {{ user.email }} |
    Paid: {{ user.paid }}

    <a href="/admin/toggle/{{ user.id }}">Toggle Access</a>
</p>
{% endfor %}

<hr>

<h3>Create User</h3>
<form method="POST" action="/admin/create_user">
    <input name="email" placeholder="Email" required>
    <input name="password" placeholder="Password" required>
    <button type="submit">Create User</button>
</form>

<hr>

<h3>Add Rule (Keyword)</h3>
<form method="POST" action="/admin/add_rule">
    <input name="user_id" placeholder="User ID" required>
    <input name="keyword" placeholder="Keyword (e.g. payment failed)" required>
    <input name="weight" type="number" placeholder="Weight (1–10)" required>
    <button type="submit">Add Rule</button>
</form>
